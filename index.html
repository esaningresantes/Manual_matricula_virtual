I: {
    title: "I. Matrícula",
    icon: "file-check",
    html: `
    <div class="max-w-4xl mx-auto animate-[fadeIn_0.5s]">
        <h2 class="text-3xl text-white font-serif mb-6">I. Matrícula</h2>
        <div class="glass p-8 rounded-xl space-y-6 text-slate-300">

            <p class="text-lg">
            El sistema de matrícula se caracteriza por permitir al estudiante la elección de cursos y horarios
            con cierto margen. A la matrícula se accede según el turno u orden de prioridad, el cual considera
            las <strong>notas obtenidas en las asignaturas del ciclo inmediato anterior y el número de créditos
            acumulados por el alumno</strong>, otorgándoles la primera prioridad a los alumnos que tengan por
            cursar a lo más 30 créditos para culminar sus estudios. <strong>(Art 16° del Reglamento de Estudios)</strong>
            </p>

            <p class="font-semibold text-white">Sugerimos a los estudiantes:</p>
            <ul class="list-disc pl-6 space-y-1">
                <li> Analizar cuidadosamente su propia situación académica.</li>
                <li> Reflexionar sobre sus metas de estudio.</li>
                <li> Asesorarse con los profesores.</li>
                <li> Tomar en cuenta las normas y contenidos en este documento.</li>
            </ul>

           <p class="text-lg">
             La matrícula es responsabilidad del alumno, quien para realizarla deberá tener en cuenta las
             normas vigentes. Una vez efectuada solamente se podrá gestionar modificaciones a la misma por
             cierre de asignaturas. El alumno será responsable de que en su matrícula no se produzcan cruce
             de horarios de clases. 
             <a href="https://transparenciauniversitaria.esan.edu.pe/wp-content/uploads/2025/03/Reglam_Estudios_de_Pregrado_29.01.2025.pdf" target="_blank" class="text-blue-400 underline font-semibold">
             (Art 22° del Reglamento de Estudios)
             </a>
             </p>

            
            <p class="font-extrabold text-red-400 drop-shadow-[0_0_8px_rgba(255,0,0,0.9)]">Cursos Obligatorios</p>
            <ul class="list-disc pl-6 space-y-1">
                <li> Los alumnos deberán matricularse en los cursos obligatorios que hayan desaprobado en el
                ciclo ordinario inmediatamente siguiente. <a href="https://transparenciauniversitaria.esan.edu.pe/wp-content/uploads/2025/03/Reglam_Estudios_de_Pregrado_29.01.2025.pdf" target="_blank" class="text-blue-400 underline font-semibold">(Art 18° del Reglamento de Estudios)</li></a>
                <li> El alumno sólo podrá matricularse en asignaturas obligatorias de hasta tres ciclos
                consecutivos, salvo en casos de traslados. <a href="https://transparenciauniversitaria.esan.edu.pe/wp-content/uploads/2025/03/Reglam_Estudios_de_Pregrado_29.01.2025.pdf" target="_blank" class="text-blue-400 underline font-semibold">(Art 20° del Reglamento de Estudios)</li></a>
            </ul>

            <p class="font-extrabold text-red-400 drop-shadow-[0_0_8px_rgba(255,0,0,0.9)]">Cursos Electivos</p>
            <p>
            Los planes de estudio de todas las carreras consideran una determinada cantidad de créditos en
            cursos electivos de formación y especialidad. La decisión de matricularse en estos cursos
            corresponde al estudiante, siempre que cumpla con los requisitos correspondientes y demás
            normas de matrícula. Si un estudiante lo desea, puede seleccionar una mayor cantidad de cursos
            electivos de los que establece su plan de estudios.
            </p>

            <ul class="list-disc pl-6 space-y-1">
                <li> Se recomienda revisar su plan de estudios publicado en la UEvirtual para verificar la
                cantidad de cursos electivos de formación y especialidad que debe aprobar.</li>
            </ul>

            <p>
            Asimismo, debe revisar su Portal Académico para verificar los cursos electivos aprobados
            hasta la fecha.
            </p>

            <p class="font-extrabold text-red-400 drop-shadow-[0_0_8px_rgba(255,0,0,0.9)]">Matrícula en menos de 12 créditos</p>
            <ul class="list-disc pl-6 space-y-1">
                <li> Aquellos alumnos que por diversas razones requieran matricularse en menos de 12
créditos, deberán presentar el formulario de Solicitud de matrícula en menos de 12 créditos
y luego podrán registrarse en las asignaturas según su turno de matrícula (Ver modelos y formatos de solicitudes en su UEvirtual).</li>
            </ul>

            <p class="font-extrabold text-red-400 drop-shadow-[0_0_8px_rgba(255,0,0,0.9)]">Matrícula en más de 24 créditos</p>
            <ul class="list-disc pl-6 space-y-1">
                <li> Aquellos alumnos que requieran matricularse en más de 24 créditos, podrán hacerlo
siempre que su promedio ponderado sea igual o mayor a 15.00.  <a href="https://secretariageneral.esan.edu.pe/images/documentos/Reglamentos/Reglam_Estudios_de_Pregrado_29.01.2025.pdf" target="_blank" class="text-blue-400 underline font-semibold">(Reglamento de Estudios)</li></a>
            </ul>
                 <ul class="list-disc pl-6 space-y-1">
                <li> Aquellos alumnos que se encuentren en el ciclo 15 (quince) de permanencia y cumplan con
los prerrequisitos establecidos podrán matricularse en más de 24 créditos y en ningún caso
en más de 28 créditos. <a href="https://secretariageneral.esan.edu.pe/images/documentos/Reglamentos/Reglam_Estudios_de_Pregrado_29.01.2025.pdf" target="_blank" class="text-blue-400 underline font-semibold">(Reglamento de Estudios)</li></a>
            </ul>
 <p>
            Deberán presentar la solicitud que se encuentra en la UE Virtual (Ver modelos y formatos de solicitudes en su UEvirtual) y deben ser enviados al correo de Servicios Académicos (<a href="mailto:ssacad@ue.edu.pe" class="text-blue-600 hover:underline font-semibold">ssacad@ue.edu.pe</a> ).</a>
            </p>
            
  <p class="font-extrabold text-red-400 drop-shadow-[0_0_8px_rgba(255,0,0,0.9)]">Matrícula en cursos por tercera vez</p>          
            <p>
            Aquellos alumnos que estarán cursando una o más asignaturas por tercera vez solo se les
permite matricular hasta en 17 créditos. <a href="https://secretariageneral.esan.edu.pe/images/documentos/Reglamentos/Reglam_Estudios_de_Pregrado_29.01.2025.pdf" target="_blank" class="text-blue-400 underline font-semibold">(Reglamento de Estudios)</a>
            </p>
            <p>
            Si usted va a cursar una asignatura por tercera vez es crucial que enfoque su energía y
recursos de manera efectiva para lograr el éxito. En tal sentido se le recomienda que se
matricule en un solo curso en riesgo. En caso desee matricularse en más de una asignatura
en riesgo, le solicitamos conversar con su director de especialidad a fin de que pueda evaluar
mejor su decisión. 
            </p>

<p class="font-extrabold text-red-400 drop-shadow-[0_0_8px_rgba(255,0,0,0.9)]">Matrícula en un curso que no cumple requisitos</p> 
            <p>
          Aquellos alumnos a quienes les falte cursar <strong>menos de 21 créditos</strong> para culminar su carrera
podrán matricularse excepcionalmente en <strong>un curso junto con su requisito, siempre que
con esta matrícula el alumno culmine su carrera.</strong> En esta situación el estudiante <strong>no podrá
retirarse de ningún curso, sin previamente no haberse retirado del curso con matrícula
excepcional.</strong> La aprobación del requisito es una condición necesaria para poder aprobar
dicho curso. 
            </p>
<p class="font-extrabold text-red-400 drop-shadow-[0_0_8px_rgba(255,0,0,0.9)]">Cierre de cursos</p> 
            <p>
            La Universidad se reserva el derecho de cerrar asignaturas una vez concluida la matrícula,
            cuando el número de alumnos matriculados no sea superior a doce (12).
            </p>

            <p>
            En los cursos en que no se alcance el número mínimo de matriculados, los estudiantes se
            podrán registrar en otro curso siempre que existan vacantes disponibles.
            </p>

            <p>
            La Oficina de Servicios Académicos enviará un correo al alumno informándole del cierre de
            secciones.
            </p>

            <p class="font-extrabold text-red-400 drop-shadow-[0_0_8px_rgba(255,0,0,0.9)]">Track de Inglés</p> 
                <p>
                    La aprobación de la acreditación de conocimiento del idioma inglés es uno de los requisitos
                    citados en el Reglamento de Grados y Títulos para ser considerado egresado.
                </p>

                <p>
                    <a href="https://secretariageneral.esan.edu.pe/images/documentos/Reglamentos/Reglam_Estudios_de_Pregrado_29.01.2025.pdf"
                       target="_blank"
                       class="text-blue-400 hover:underline font-semibold">
                       Ver Reglamento de Estudios
                    </a>
                </p>

                <p>
                    <a href="https://uevirtual.ue.edu.pe/intranet/images/04-Reglamentos/2024/Resoluci%C3%B3n_N002-2024_VRA_2.pdf"
                       target="_blank"
                       class="text-blue-400 hover:underline font-semibold">
                       Ver Resolución de Acreditación de Conocimiento de Idioma Inglés
                    </a>
                </p>

<p class="font-semibold text-white">Sólo podrá matricularse virtualmente si:</p>
            <ul class="list-disc pl-6 space-y-1">
                <li>No presenta deudas de libros con biblioteca (CENDOC).</li>
                <li>No tiene deudas pendientes con el área de Finanzas Pregrado o no han cumplido con su compromiso de pago.</li>
                <li>Efectuó el pago de la primera boleta hasta la fecha de <strong>vencimiento (4 de marzo).</strong></li>
                <li>No tiene asuntos pendientes con Servicios Académicos (Haber presentado retiro definitivo, estar en condición de baja académica, no haber asistido a las reuniones del Comité de Disciplina, etc).</li>
            </ul>

            <p class="font-extrabold text-red-400 drop-shadow-[0_0_8px_rgba(255,0,0,0.9)]">Requerimientos técnicos</p> 
            <p>
            Para poder registrar la matrícula virtual deberá asegurarse de que su equipo cumpla con las
            siguientes especificaciones técnicas:
            </p>

            <p class="font-semibold text-white">Software:</p>
            <ol class="list-decimal pl-6 space-y-1">
            <li>Sistema Operativo: Windows XP o superior (Vista, 7, 8) GNU/Linux</li>
            <li>Navegador actualizado Mozilla 7.0 ó superior. Navegador Google Chrome, Navegador IE 9.0 como última opción</li>
            </ol>


            <p class="font-semibold text-white">Hardware:</p>
            <ol class="list-disc pl-6 space-y-1">
                <li>Procesador Core 2 Duo o superior.</li>
                <li>Memoria de 1GB o superior.</li>
                <li>De preferencia impresora para poder imprimir la ficha de matrícula.</li>
            </ol>

            <p class="font-semibold text-white">Recomendaciones:</p>
            <p>
            Si su conexión de Internet es inalámbrica, asegúrese que no haya otro miembro de su entorno
            utilizando el internet bajando videos o escuchando música mientras Ud. realice la matrícula.
            </p>

        </div>
    </div>`
},

II: {
    title: "II. Pasos de la matrícula",
    icon: "file-check",
    html: `
    <div class="max-w-4xl mx-auto animate-[fadeIn_0.5s]">
        <h2 class="text-3xl text-white font-serif mb-6">II. Pasos de la Matrícula</h2>

        <div class="glass p-8 rounded-xl space-y-6 text-slate-300">

            <p class="text-lg font-semibold text-white">
            Procedimiento para registrar la matrícula virtual:
            </p>

            <ol class="list-decimal pl-6 space-y-4">

                <li>
                Obtenga la información para la matrícula vía Internet en la plataforma UeVirtual.
                    </a>
</li>

<li>
                Asegúrese de haber efectuado el pago de su anticipo o de su primera boleta para estar habilitado.
                Consultas: <a href="mailto:finanzaspregrado@ue.edu.pe" class="text-blue-400 hover:underline font-semibold">
        finanzaspregrado@ue.edu.pe.
    </a>
</li>

                <li>
                Respecto a los libros prestados por biblioteca (CENDOC). Cualquier problema o consulta realizarla al Sr. Oscar Pilco
                (<a href="mailto:opilco@esan.edu.pe" class="text-blue-600 hover:underline font-semibold">opilco@esan.edu.pe</a> y/o al Sr. Alfredo Mendoza <a href="mailto:amendoza@esan.edu.pe" class="text-blue-600 hover:underline font-semibold"> amendoza@esan.edu.pe</a>).
                </li>

                <li>
                Asegúrese de no tener asuntos académicos pendientes que imposibiliten su matrícula
(haber desaprobado 3 veces una misma asignatura, no haber asistido a las citaciones del
Comité de Disciplina, etc). Cualquier problema o consulta sobre este punto, realizarla al correo
de Servicios Académicos (<a href="mailto:ssacad@ue.edu.pe" class="text-blue-600 hover:underline font-semibold"> ssacad@ue.edu.pe</a>).
                </li>

                <li>
                Para efectuar su matrícula en internet ingrese a:
                <a href="http://matriculavirtual.ue.edu.pe/" target="_blank" class="text-red-600 underline font-semibold">
                http://matriculavirtual.ue.edu.pe/
                </a>
                en el
día y la hora que le corresponda según su turno de matrícula. Sólo podrá acceder al sistema
de matrícula a partir de la hora y fecha indicadas en su turno de matrícula. De ninguna forma
podrá acceder antes y si por cualquier razón no pudo ingresar al sistema en la fecha indicada,
podrá matricularse al día siguiente desde las <strong>09:00 hrs.</strong> hasta las <strong>17:00 hrs.</strong> mientras se
encuentre activo el proceso de matrícula.

                </li>

                <li>
                Seleccione las asignaturas que desee seguir y luego de confirmar la matrícula, verifique
en la pantalla que la información de su matrícula esté conforme. A continuación, guarde la Ficha
de Matrícula en su computadora.

                </li>

                <li>
               Lea la Declaración Jurada que se adjunta en la ficha y asegúrese de marcar su
conformidad.
                </li>

                <li>
                Al elegir las asignaturas deberá tener en consideración:
                <ul class="list-disc pl-6 mt-2 space-y-1">

    <li>
      Debe cumplir los requisitos que señala el plan de estudios de su especialidad para
      matricularse (Ver mallas curriculares en su UEvirtual).
    </li>

    <li class="font-semibold text-slate-200">
      No está permitido matricularse con cruce de horarios de clase.
      <a href="https://secretariageneral.esan.edu.pe/images/documentos/Reglamentos/Reglam_Estudios_de_Pregrado_29.01.2025.pdf"
         target="_blank"
         class="text-blue-600 underline font-semibold hover:text-blue-600">
        (Reglamento de Estudios)
      </a>
    </li>

    <li>
      Si el alumno <strong class="text-white">se encuentra en situación de riesgo alto</strong>
      (se matricula en una asignatura desaprobada dos veces anteriormente) podrá matricularse
      en un máximo de 17 créditos, según lo señalado en el Reglamento de Estudios.
      <a href="https://secretariageneral.esan.edu.pe/images/documentos/Reglamentos/Reglam_Estudios_de_Pregrado_29.01.2025.pdf"
         target="_blank"
         class="text-blue-600 underline font-semibold hover:text-blue-600">
        (Reglamento de Estudios)
      </a>
    </li>

    <li>
      Si el alumno <strong class="text-white">no se encuentra en riesgo</strong> podrá matricularse
      en un mínimo de 12 créditos y en un máximo de 24 créditos. Para matricularse en menos de
      12 créditos o en más de 24 créditos, requiere autorización excepcional de la Dirección
      de Pregrado, según lo señalado en el Reglamento de Estudios.
      <a href="https://secretariageneral.esan.edu.pe/images/documentos/Reglamentos/Reglam_Estudios_de_Pregrado_29.01.2025.pdf"
         target="_blank"
         class="text-blue-600 underline font-semibold hover:text-blue-600">
        (Reglamento de Estudios)
      </a>
    </li>

    <li>
      Las solicitudes de matrícula por menos de 12 créditos o más de 24 créditos deben enviarse
      al correo de Servicios Académicos
      <a href="mailto:ssacad@ue.edu.pe"
         class="text-blue-600 underline font-semibold hover:text-blue-600">
        ssacad@ue.edu.pe

        // --- NAVEGACIÓN ---
function renderMenu() {
    const container = document.getElementById('menu-container');

    if (!container || !db) return;

    const keys = Object.keys(db).filter(k => k !== 'welcome');

    container.innerHTML = keys.map(key => `
        <button 
            onclick="renderContent('${key}')" 
            id="btn-${key}" 
            class="w-full text-left px-6 py-3 text-slate-300 text-[13px] font-semibold tracking-wide hover:text-white hover:bg-slate-800 transition flex items-center gap-3">
            <i data-lucide="${db[key].icon || 'file'}" class="w-4 h-4"></i> 
            ${db[key].title}
        </button>
    `).join('');

    lucide.createIcons();
}

function renderContent(key) {
    const viewer = document.getElementById('viewer');

    if (!viewer || !db[key]) {
        console.warn("Sección no encontrada:", key);
        return;
    }

    viewer.innerHTML = db[key].html;

    // Activar botón actual
    document.querySelectorAll('#menu-container button')
        .forEach(b => b.classList.remove('active-tab'));

    const btn = document.getElementById(`btn-${key}`);
    if (btn) btn.classList.add('active-tab');

    lucide.createIcons();
    viewer.scrollTop = 0;
}

// ==========================
// BUSCADOR INTELIGENTE PRO
// ==========================

const searchInput = document.getElementById("search");

// Crear caja de resultados dinámicamente
const resultsBox = document.createElement("div");
resultsBox.className = "absolute top-16 left-0 right-0 bg-slate-900 border-b border-slate-700 shadow-lg max-h-60 overflow-y-auto hidden z-50";
document.querySelector("main").appendChild(resultsBox);

searchInput.addEventListener("input", function () {
    const query = this.value.toLowerCase().trim();
    resultsBox.innerHTML = "";

    if (query.length < 3) {
        resultsBox.classList.add("hidden");
        return;
    }

    let matches = [];

    for (let key in db) {
        const section = db[key];

        const title = section.title.toLowerCase();
        const content = section.html.replace(/<[^>]*>/g, "").toLowerCase();

        if (title.includes(query) || content.includes(query)) {
            matches.push({
                key: key,
                title: section.title
            });
        }
    }

    if (matches.length === 0) {
        resultsBox.innerHTML = `
            <div class="px-6 py-3 text-slate-400">
                No se encontraron resultados
            </div>
        `;
    } else {
        matches.forEach(match => {
            const item = document.createElement("div");
            item.className = "px-6 py-3 text-white hover:bg-red-600 cursor-pointer transition";

            item.innerText = match.title;

            item.addEventListener("click", () => {
                renderContent(match.key);
                resultsBox.classList.add("hidden");
                searchInput.value = "";
            });

            resultsBox.appendChild(item);
        });
    }

    resultsBox.classList.remove("hidden");
});

// Cerrar si hace clic fuera
document.addEventListener("click", function (e) {
    if (!e.target.closest(".h-16")) {
        resultsBox.classList.add("hidden");
    }
});


        // Iniciar
document.addEventListener("DOMContentLoaded", () => {
    renderMenu();
    renderContent('welcome');
});

    </script>
